# Module boundary for Loan. A module's Domain/Application may depend only on
# itself + the shared kernel, never on another module. Infrastructure is left
# uncollected on purpose: cross-module integration is allowed there only.
#
# Loan reads Customer + Product through its own read-model ports
# (Application/Repository/*ReadModelRepositoryInterface). The adapters that fetch
# from those contexts live in Loan's Infrastructure, so Domain/Application stay
# clean and this boundary holds with no baselined violations.
deptrac:
  paths:
    - ../src
  layers:
    - name: Application
      collectors:
        - type: classLike
          value: '^App\\Module\\Loan\\Application\\.*'
    - name: Domain
      collectors:
        - type: classLike
          value: '^App\\Module\\Loan\\Domain\\.*'
    - name: ExternalApplication
      collectors:
        - type: bool
          must:
            - type: classLike
              value: '^App\\Module\\[^\\]+\\Application\\.*'
          must_not:
            - type: classLike
              value: '^App\\Module\\Loan\\Application\\.*'
    - name: ExternalDomain
      collectors:
        - type: bool
          must:
            - type: classLike
              value: '^App\\Module\\[^\\]+\\Domain\\.*'
          must_not:
            - type: classLike
              value: '^App\\Module\\Loan\\Domain\\.*'
    - name: SharedKernel
      collectors:
        - type: classLike
          value: '^App\\Shared\\.*'
  ruleset:
    Application:
      - Domain
      - SharedKernel
    Domain:
      - SharedKernel
    SharedKernel:
      - ExternalApplication
      - ExternalDomain
    ExternalApplication:
      - Application
      - Domain
      - ExternalDomain
      - SharedKernel
    ExternalDomain:
      - Application
      - Domain
      - ExternalApplication
      - SharedKernel
