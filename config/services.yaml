# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Domain modules + shared kernel. One service per class (id = FQCN).
    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/**/Entity/'
            - '../src/**/ValueObject/'
            - '../src/Module/*/Domain/Repository/'
            - '../src/Module/*/Application/Repository/'
            - '../src/**/DependencyInjection/'

    # Presentation — API app (listeners, response shaping, controllers).
    Api\:
        resource: '../apps/api/src/'

    # Controllers are plain classes (no AbstractController base), so they need the
    # controller.service_arguments tag explicitly to get their action arguments injected.
    Api\Controller\:
        resource: '../apps/api/src/Controller/'
        tags: [ 'controller.service_arguments' ]

    Api\Module\:
        resource: '../apps/api/src/Module/'
        tags: [ 'controller.service_arguments' ]

    # Presentation — CLI app (console commands).
    Cli\:
        resource: '../apps/cli/src/'

    # Bind each adapter to its own Messenger bus (autowiring would inject the default bus).
    App\Shared\Infrastructure\Bus\Messenger\MessengerCommandBus:
        arguments:
            $commandBus: '@command.bus'

    App\Shared\Infrastructure\Bus\Messenger\MessengerQueryBus:
        arguments:
            $queryBus: '@query.bus'

    App\Shared\Infrastructure\Bus\Messenger\MessengerEventBus:
        arguments:
            $eventBus: '@event.bus'

    App\Shared\Application\Bus\Command\CommandBusInterface: '@App\Shared\Infrastructure\Bus\Messenger\MessengerCommandBus'
    App\Shared\Application\Bus\Query\QueryBusInterface: '@App\Shared\Infrastructure\Bus\Messenger\MessengerQueryBus'
    App\Shared\Application\Bus\Event\EventBusInterface: '@App\Shared\Infrastructure\Bus\Messenger\MessengerEventBus'
    App\Shared\Application\Transaction\TransactionManagerInterface: '@App\Shared\Infrastructure\Persistence\DoctrineTransactionManager'

    App\Shared\Domain\Identity\UuidFactoryInterface: '@App\Shared\Infrastructure\Identity\SymfonyUuidFactory'

    # Module ports — domain interface bound to its infrastructure adapter.
    App\Module\Loan\Domain\Service\NewYorkLotteryInterface: '@App\Module\Loan\Infrastructure\Service\RandomNewYorkLottery'
    App\Shared\Application\Notification\NotificationSenderInterface: '@App\Shared\Infrastructure\Notification\LoggingNotificationSender'

    # Repository interfaces (Domain) bound to their Doctrine implementations (Infrastructure).
    App\Module\Customer\Domain\Repository\CustomerRepositoryInterface: '@App\Module\Customer\Infrastructure\Repository\CustomerRepository'
    App\Module\Loan\Domain\Repository\LoanRepositoryInterface: '@App\Module\Loan\Infrastructure\Repository\LoanRepository'
    App\Module\Product\Domain\Repository\ProductRepositoryInterface: '@App\Module\Product\Infrastructure\Repository\ProductRepository'

    # Loan read-model ports (Application) bound to their anti-corruption adapters (Infrastructure),
    # which are the only Loan code allowed to read from the Customer / Product contexts.
    App\Module\Loan\Application\Repository\ApplicantReadModelRepositoryInterface: '@App\Module\Loan\Infrastructure\Repository\ApplicantReadModelRepository'
    App\Module\Loan\Application\Repository\ProductReadModelRepositoryInterface: '@App\Module\Loan\Infrastructure\Repository\ProductReadModelRepository'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
