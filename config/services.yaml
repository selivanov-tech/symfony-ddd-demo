# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.date_format: 'Y-m-d'
    app.notification.channels:
        - !php/enum App\Application\Enum\NotificationChannelEnum::EMAIL
        - !php/enum App\Application\Enum\NotificationChannelEnum::SMS

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Infrastructure/Kernel.php'
            - '../src/**/Entity/'
            - '../src/**/ValueObject/'
            - '../src/**/Repository/'
            - '../src/**/DependencyInjection/'

    App\Infrastructure\Http\Controller\:
        resource: '../src/Infrastructure/Http/Controller/'
        tags: [ 'controller.service_arguments' ]

    App\Infrastructure\Util\Date\DateParser:
        arguments:
            $format: '%app.date_format%'

    App\Infrastructure\Event\Subscriber\ApiEventSubscriber:
        tags: { name: kernel.event_subscriber }

    App\Infrastructure\Service\Notification\NotificationService:
        arguments:
            $channels: '%app.notification.channels%'

    App\Infrastructure\Event\Subscriber\LoanEventSubscriber:
        tags: { name: kernel.event_subscriber }

    # Bind each adapter to its own Messenger bus (autowiring would inject the default bus).
    App\Shared\Infrastructure\Bus\Messenger\MessengerCommandBus:
        arguments:
            $commandBus: '@command.bus'

    App\Shared\Infrastructure\Bus\Messenger\MessengerQueryBus:
        arguments:
            $queryBus: '@query.bus'

    App\Shared\Infrastructure\Bus\Messenger\MessengerEventBus:
        arguments:
            $eventBus: '@event.bus'

    App\Shared\Application\Bus\Command\CommandBusInterface: '@App\Shared\Infrastructure\Bus\Messenger\MessengerCommandBus'
    App\Shared\Application\Bus\Query\QueryBusInterface: '@App\Shared\Infrastructure\Bus\Messenger\MessengerQueryBus'
    App\Shared\Application\Bus\Event\EventBusInterface: '@App\Shared\Infrastructure\Bus\Messenger\MessengerEventBus'
    App\Shared\Application\Transaction\TransactionManagerInterface: '@App\Shared\Infrastructure\Persistence\DoctrineTransactionManager'

    App\Domain\Loan\Service\NewYorkLotteryInterface: '@App\Infrastructure\Service\Loan\RandomNewYorkLottery'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
