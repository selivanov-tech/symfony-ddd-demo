doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        types:
            !php/const App\Infrastructure\Persistence\Doctrine\Type\MoneyType::NAME: App\Infrastructure\Persistence\Doctrine\Type\MoneyType
            !php/const App\Infrastructure\Persistence\Doctrine\Type\UuidType::NAME: App\Infrastructure\Persistence\Doctrine\Type\UuidType
            !php/const App\Infrastructure\Persistence\Doctrine\Type\EmailType::NAME: App\Infrastructure\Persistence\Doctrine\Type\EmailType
            !php/const App\Infrastructure\Persistence\Doctrine\Type\PhoneType::NAME: App\Infrastructure\Persistence\Doctrine\Type\PhoneType
            !php/const App\Infrastructure\Persistence\Doctrine\Type\SsnType::NAME: App\Infrastructure\Persistence\Doctrine\Type\SsnType
            !php/const App\Infrastructure\Persistence\Doctrine\Type\FicoScoreType::NAME: App\Infrastructure\Persistence\Doctrine\Type\FicoScoreType

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: false
        mappings:
            Domain:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Domain'
                prefix: App\Domain
                alias: Domain
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
